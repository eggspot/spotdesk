<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="13" ry="13" fill="#171B26"/>
  <!-- Monitor bezel — accent blue -->
  <rect x="9" y="9" width="46" height="32" rx="4" ry="4" fill="#3B82F6"/>
  <!-- Screen surface — dark inner -->
  <rect x="12" y="12" width="40" height="25" rx="2" ry="2" fill="#0F1117"/>
  <!-- Terminal line 1 (full width) -->
  <rect x="16" y="16" width="28" height="2" rx="1" ry="1" fill="#93C5FD"/>
  <!-- Terminal line 2 (medium) -->
  <rect x="16" y="21" width="22" height="2" rx="1" ry="1" fill="#93C5FD"/>
  <!-- Terminal line 3 (short) -->
  <rect x="16" y="26" width="16" height="2" rx="1" ry="1" fill="#93C5FD"/>
  <!-- Monitor stand stem -->
  <rect x="30" y="41" width="4" height="7" fill="#3B82F6"/>
  <!-- Monitor base -->
  <rect x="23" y="48" width="18" height="4" rx="2" ry="2" fill="#3B82F6"/>
</svg>
